version: "3.9"

services:

  challenge-cac-backend:
    container_name: challenge-cac-backend
    build:
      context: ./challenge-cac-backend
      dockerfile: Dockerfile
    ports:
      - "4099:8000"
    environment:
      APP_ENV: production
      APP_DEBUG: false
      APP_URL: http://${SERVER_IP:-localhost}:4099
      FRONTEND_URL: http://${SERVER_IP:-localhost}:4000
      SANCTUM_STATEFUL_DOMAINS: ${SERVER_IP:-localhost}:4000

      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/database/database.sqlite

    volumes:
      - ./challenge-cac-backend:/var/www
      - ./logs/backend:/var/www/storage/logs

    networks:
      - challenge-cac-net

    restart: unless-stopped


  challenge-cac-frontend:
    container_name: challenge-cac-frontend
    build:
      context: ./challenge-cac-frontend
      dockerfile: Dockerfile
    ports:
      - "4000:5173"
    environment:
      VITE_API_URL: http://${SERVER_IP:-localhost}:4099/api
    volumes:
      - ./challenge-cac-frontend:/app
      - /app/node_modules
    networks:
      - challenge-cac-net

    restart: unless-stopped


networks:
  challenge-cac-net:
    external: true
