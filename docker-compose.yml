version: "3.9"

services:

  challenge-cac-backend:
    container_name: challenge-cac-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4099:8000"
    environment:
      APP_ENV: production
      APP_DEBUG: false
      APP_URL: http://localhost:4099

      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/database/database.sqlite

    volumes:
      - ./backend:/var/www
      - /var/app/logs/challenge-cac-backend:/var/www/storage/logs

    networks:
      - challenge-cac-net

    restart: unless-stopped


  challenge-cac-frontend:
    container_name: challenge-cac-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4000:5173"
    volumes:
      - ./frontend:/app
    networks:
      - challenge-cac-net

    restart: unless-stopped


networks:
  challenge-cac-net:
    external: true
